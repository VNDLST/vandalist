---
deployment:
  tasks:
    - export PATH=/home/vandalis/nodevenv/repositories/vandalist/20/bin:$PATH
    - export GOMAXPROCS=1
    - export RAYON_NUM_THREADS=1
    - export UV_THREADPOOL_SIZE=1
    - export DEPLOYPATH=/home/vandalis/repositories/vandalist/
    - cd $DEPLOYPATH
    - npm install
    - npm run build
    - /bin/mkdir -p /home/vandalis/public_html/vandalist-2.0
    - /bin/cp -R dist/* /home/vandalis/public_html/vandalist-2.0/
